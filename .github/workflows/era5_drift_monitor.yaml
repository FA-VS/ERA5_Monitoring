name: ERA5 drift monitor

on:
  push:
    branches: [main]
    paths:                       # rebuild only when code or reference data changes
      - '**.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'data/reference/**'
  schedule:
    - cron: '0 3 1 * *'          # monthly: run the monitor on a regular basis
  workflow_dispatch:             # manual trigger, with changeable reference
    inputs:
      reference_glob:
        default: 'data/reference/*1950s*.nc'
      reference_years:
        default: '1950s'
      drift_threshold:
        default: '1.0'
      recent_year:
        default: '2025'

#env:
#  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  # ── Build & push the image, but only on code/data changes ──────────
  build:
    # skip building on the scheduled run — reuse the existing image
    # TODO: Clean-up / version images, so they don't pile up in github's registry
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # needed to push to GHCR
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic, no setup needed

      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha    # layer caching → fast rebuilds
          cache-to: type=gha,mode=max

  # ── Run the monitor ────────────────────────────────────────────────
  monitor:
    needs: build
    # run if build succeeded, OR on schedule (when build was skipped)
    if: always() && (needs.build.result == 'success' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    permissions:
      id-token: write           # Needed for AWS??
      contents: read
      packages: read             # needed to pull from GHCR
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - uses: aws-actions/configure-aws-credentials@v4 # Will set all the AWS envvars
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}

      - name: Run drift monitor
        env:
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          docker run \
            -e CDSAPI_URL -e CDSAPI_KEY \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN \
            -e AWS_REGION -e AWS_DEFAULT_REGION \
            -e MLFLOW_TRACKING_URI \
            ${{ env.IMAGE }} \
            --fetch \
            --recent-year "${{ github.event.inputs.recent_year || '2025' }}" \
            --reference-glob "${{ github.event.inputs.reference_glob || 'data/reference/*1950s*.nc' }}" \
            --reference-years "${{ github.event.inputs.reference_years || '1950s' }}" \
            --drift-threshold "${{ github.event.inputs.drift_threshold || '1.0' }}"
